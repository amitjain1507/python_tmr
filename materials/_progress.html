<script>
(() => {
  const storagePrefix = "ptmr-materials-progress:";
  const checks = [...document.querySelectorAll("[data-progress-id]")];
  const count = document.querySelector("[data-progress-count]");
  const total = document.querySelector("[data-progress-total]");
  const reset = document.querySelector("[data-progress-reset]");
  const externalLinks = [
    ...document.querySelectorAll('a[href^="http://"], a[href^="https://"]'),
  ];
  const copySources = [...document.querySelectorAll(".copy-source")];

  externalLinks.forEach((link) => {
    link.target = "_blank";
    link.rel = "noopener noreferrer";
  });

  copySources.forEach((source) => {
    source.addEventListener("focus", () => source.select());
  });

  if (total) {
    total.textContent = checks.length;
  }

  function storageKey(box) {
    return `${storagePrefix}${box.dataset.progressId}`;
  }

  function updateCount() {
    if (!count) {
      return;
    }
    count.textContent = checks.filter((box) => box.checked).length;
  }

  checks.forEach((box) => {
    box.checked = localStorage.getItem(storageKey(box)) === "true";
    box.addEventListener("change", () => {
      localStorage.setItem(storageKey(box), String(box.checked));
      updateCount();
    });
  });

  if (reset) {
    reset.addEventListener("click", () => {
      checks.forEach((box) => {
        box.checked = false;
        localStorage.removeItem(storageKey(box));
      });
      updateCount();
    });
  }

  updateCount();
})();
</script>
